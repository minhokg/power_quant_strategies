name: CI/CD Pipeline

on:
  pull_request:
    types: [opened, synchronize, closed] # Triggers for PRs
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Linting and formatting checks with ruff
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'minhokg/power_quant_strategies' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57  # v8.0.0
        with:
          python-version: '3.11'
      - name: Install ruff
        run: uv tool install ruff==0.8.2
      - name: Run ruff linter checks
        run: ruff check .
      - name: Run ruff formatter checks
        run: ruff format --check .
